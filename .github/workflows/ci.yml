name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      browser_contract:
        description: 'Run browser contract with Playwright'
        required: false
        default: false
        type: boolean

jobs:
  build_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fast check
        run: npm run check

      - name: Install Playwright browsers
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.browser_contract }}
        run: npx playwright install --with-deps chromium

      - name: Browser contract
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.browser_contract }}
        run: npm run check:browser
