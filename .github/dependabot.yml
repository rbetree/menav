version: 2

updates:
  - package-ecosystem: npm
    directory: /
    target-branch: main
    schedule:
      interval: monthly
      time: '09:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: chore
      include: scope
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: monthly
      time: '09:15'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - '*'
